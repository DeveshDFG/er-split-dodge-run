; separate_roll_and_sprint — unified keyboard + controller Dash config.

dash_key=LeftShift
dash_button=L3
dash_trigger_threshold=80
gamepad_index=any
left_stick_dash_deadzone=12000

enable_menu_patch=0

; dash_key (keyboard): sprint only — never toggles crouch.
; dash_button (controller): neutral left stick = crouch/stealth, tilted stick = sprint.
; Applies to any dash_button (L3, L1, Cross, DPad, etc.).
; Controller sprint reactivation cooldown (HKS): ERSPLIT_CONTROLLER_SPRINT_COOLDOWN_FRAMES in c0000.hks
;   4 = subtle, 6 = default, 8-10 = stronger anti-spam after controller sprint release
; controller_sprint_cooldown_frames=6
; Avoid binding the same physical controller button elsewhere in-game.

; F10 in-game: re-read this INI

; 1 = hold the dodge bind after roll-on-press to sprint.
; When enabled, dash_key/dash_button are ignored.
keep_sprint_on_dodge_hold=0

; --- Advanced (optional; not required for normal use) ---
; After-attack roll direction uses WASD internally. Controller uses XInput left stick.
; Uncomment only if you use non-WASD keyboard movement binds:
; move_forward=W
; move_back=S
; move_left=A
; move_right=D
; Controller stick deadzone for roll direction (default 12000 if omitted):
; movement_stick_deadzone=12000
